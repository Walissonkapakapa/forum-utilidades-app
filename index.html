<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sntx fórum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- NSFWJS + TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nsfwjs@2.4.2/dist/nsfwjs.min.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .post-card { transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <!-- Intro -->
    <div id="intro-screen" class="fixed inset-0 bg-[#0a0a0a] flex items-center justify-center z-[300]">
        <div class="text-center">
            <div class="mb-4"><span class="font-display text-[5.5rem] font-bold tracking-[-5px] text-white">sntx</span></div>
            <div id="animated-text" class="font-display text-4xl font-semibold tracking-[-2px] text-zinc-400"></div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
            <div class="max-w-screen-2xl mx-auto px-8 flex items-center justify-between h-20">
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-white rounded-2xl flex items-center justify-center"><span class="font-black text-black text-2xl">s</span></div>
                    <span class="font-semibold text-2xl tracking-tight">sntx fórum</span>
                </div>
                <div class="flex items-center gap-x-3">
                    <div id="user-area"></div>
                    <button onclick="showNewPostModal()" class="bg-white text-black px-6 h-11 rounded-2xl font-semibold text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-plus"></i> <span>Publicar</span>
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-screen-2xl mx-auto px-8 pt-12">
            <div class="max-w-2xl mb-10">
                <h1 class="text-6xl font-semibold tracking-tighter">sntx fórum</h1>
                <p class="mt-3 text-xl text-zinc-400">Um espaço minimalista para compartilhar métodos que funcionam.</p>
            </div>

            <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- New Post Modal -->
    <div id="new-post-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4">
        <div class="bg-zinc-900 border border-zinc-700 w-full max-w-lg rounded-3xl p-8">
            <h3 class="text-2xl font-semibold mb-7">Nova publicação</h3>
            <input id="new-title" type="text" placeholder="Título" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 mb-4">
            <textarea id="new-content" placeholder="Descreva o método..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 h-28 mb-5"></textarea>

            <div class="mb-6">
                <label class="text-xs tracking-wider text-zinc-500 block mb-2">ADICIONAR FOTO (OPCIONAL)</label>
                <input type="file" id="post-image" accept="image/*" class="text-sm">
                <div id="image-preview" class="mt-3 hidden">
                    <img id="preview-img" class="max-h-48 rounded-2xl object-cover w-full">
                </div>
            </div>

            <div class="flex justify-end gap-x-3">
                <button onclick="hideNewPostModal()" class="px-6 py-2 text-sm text-zinc-400">Cancelar</button>
                <button onclick="createNewPost()" class="bg-white text-black px-8 py-2 rounded-2xl font-semibold">Publicar</button>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" onclick="if (event.target.id === 'profile-modal') hideProfileModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200] p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 border border-zinc-700 w-full max-w-3xl rounded-3xl p-9">
            <div class="flex items-center gap-x-6 mb-8">
                <img id="profile-avatar" class="w-24 h-24 rounded-2xl object-cover border border-zinc-700">
                <div>
                    <div id="profile-nickname" class="text-4xl font-semibold"></div>
                    <div id="profile-count" class="text-zinc-400 mt-1 text-lg"></div>
                </div>
            </div>
            <h4 class="font-semibold mb-5 text-xl">Publicações deste usuário</h4>
            <div id="profile-posts-list" class="space-y-4 max-h-[500px] overflow-auto"></div>
            <div class="mt-8 text-right">
                <button onclick="hideProfileModal()" class="px-6 py-2 text-sm text-zinc-400 hover:text-white">Fechar perfil</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== NSFW DETECTION ====================
        let nsfwModel = null;

        async function loadNSFWModel() {
            if (!nsfwModel) {
                nsfwModel = await nsfwjs.load();
            }
            return nsfwModel;
        }

        async function isNSFW(imageElement) {
            try {
                const model = await loadNSFWModel();
                const predictions = await model.classify(imageElement);
                
                // Classes: Drawing, Hentai, Neutral, Porn, Sexy
                const nsfwClasses = ['Porn', 'Hentai', 'Sexy'];
                
                for (let pred of predictions) {
                    if (nsfwClasses.includes(pred.className) && pred.probability > 0.65) {
                        return true;
                    }
                }
                return false;
            } catch (error) {
                console.error('NSFW detection error:', error);
                return false; // Fail safe - allow post if detection fails
            }
        }

        // ==================== ADMIN ====================
        const ADMIN_PASSWORD_HASH = "a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3";

        async function hashString(str) {
            const enc = new TextEncoder();
            const buf = await crypto.subtle.digest("SHA-256", enc.encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
        }

        async function toggleAdmin() {
            if (isAdmin) {
                isAdmin = false;
                alert("Modo Admin desativado");
                renderPosts();
                return;
            }
            const p = prompt("Digite a senha de admin:");
            if (!p) return;
            if (await hashString(p) === ADMIN_PASSWORD_HASH) {
                isAdmin = true;
                alert("Modo Admin ativado");
                renderPosts();
            } else {
                alert("Senha incorreta");
            }
        }

        let posts = JSON.parse(localStorage.getItem("sntxPosts") || "[]");
        let currentUser = JSON.parse(localStorage.getItem("sntxUser") || "null");
        let isAdmin = false;

        function saveAll() {
            localStorage.setItem("sntxPosts", JSON.stringify(posts));
            if (currentUser) localStorage.setItem("sntxUser", JSON.stringify(currentUser));
        }

        function renderUserArea() {
            const el = document.getElementById("user-area");
            if (!currentUser) {
                el.innerHTML = `<button onclick="login()" class="px-5 py-2 border border-zinc-700 rounded-2xl text-sm">Entrar</button>`;
            } else {
                el.innerHTML = `<div class="flex items-center gap-x-3"><div onclick="editProfile()" class="flex items-center gap-x-2 cursor-pointer"><img src="${currentUser.avatar}" class="w-8 h-8 rounded-2xl object-cover border border-zinc-700"><span>@${currentUser.nickname}</span></div><button onclick="logout()" class="text-xs text-zinc-500">sair</button></div>`;
            }
        }

        function login() {
            const nick = prompt("Seu apelido:");
            if (!nick) return;
            currentUser = { nickname: nick, avatar: "https://i.pravatar.cc/128?img=47" };
            saveAll();
            renderUserArea();
            renderPosts();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem("sntxUser");
            renderUserArea();
            renderPosts();
        }

        function editProfile() {
            const inp = document.createElement("input");
            inp.type = "file";
            inp.accept = "image/*";
            inp.onchange = e => {
                const r = new FileReader();
                r.onload = ev => {
                    currentUser.avatar = ev.target.result;
                    saveAll();
                    renderUserArea();
                    renderPosts();
                };
                r.readAsDataURL(e.target.files[0]);
            };
            inp.click();
        }

        function renderPosts() {
            const container = document.getElementById("posts-container");
            container.innerHTML = "";

            posts.forEach(post => {
                const canDelete = currentUser && (post.author === currentUser.nickname || isAdmin);
                const card = document.createElement("div");
                card.className = "post-card bg-zinc-900 border border-zinc-800 rounded-3xl p-7 cursor-pointer";
                
                let imageHTML = post.image ? `<img src="${post.image}" class="w-full rounded-2xl mb-5 max-h-80 object-cover">` : "";

                card.innerHTML = `
                    <div class="flex justify-between mb-5">
                        <span class="text-xs px-3 py-1 bg-zinc-800 rounded-full">${post.category || "Geral"}</span>
                        ${canDelete ? `<button onclick="deletePost(${post.id}, event)" class="text-red-400 text-xs">Apagar</button>` : ""}
                    </div>
                    ${imageHTML}
                    <h3 class="font-semibold text-2xl mb-3">${post.title}</h3>
                    <p class="text-[15px] text-zinc-400">${post.content}</p>

                    <div class="mt-7 pt-6 border-t border-zinc-800 flex justify-between items-center">
                        <div onclick="showUserProfile('${post.author}', event)" class="flex items-center gap-x-3 cursor-pointer">
                            <img src="${post.avatar}" class="w-8 h-8 rounded-2xl">
                            <span class="text-sm">@${post.author}</span>
                        </div>
                        <div class="flex gap-x-5 text-sm text-zinc-400">
                            <button onclick="likePost(${post.id}, event)"><i class="fa-solid fa-heart"></i> ${post.likes || 0}</button>
                            <button onclick="commentOnPost(${post.id}, event)"><i class="fa-regular fa-comment"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showUserProfile(username, e) {
            if (e) e.stopImmediatePropagation();
            const userPosts = posts.filter(p => p.author === username);
            if (!userPosts.length) return;

            document.getElementById("profile-avatar").src = userPosts[0].avatar;
            document.getElementById("profile-nickname").innerText = `@${username}`;
            document.getElementById("profile-count").innerText = `${userPosts.length} publicações`;

            const list = document.getElementById("profile-posts-list");
            list.innerHTML = "";

            userPosts.forEach(post => {
                let img = post.image ? `<img src="${post.image}" class="w-full rounded-2xl mb-3 max-h-64 object-cover">` : "";
                const d = document.createElement("div");
                d.className = "bg-zinc-800 border border-zinc-700 p-6 rounded-2xl";
                d.innerHTML = `${img}<h4 class="font-semibold text-xl mb-2">${post.title}</h4><p class="text-sm text-zinc-400">${post.content}</p>`;
                list.appendChild(d);
            });

            document.getElementById("profile-modal").classList.remove("hidden");
            document.getElementById("profile-modal").classList.add("flex");
        }

        function hideProfileModal() {
            document.getElementById("profile-modal").classList.remove("flex");
            document.getElementById("profile-modal").classList.add("hidden");
        }

        // Create post with NSFW check
        async function createNewPost() {
            if (!currentUser) return alert("Faça login primeiro");

            const title = document.getElementById("new-title").value.trim();
            const content = document.getElementById("new-content").value.trim();
            if (!title) return alert("Título é obrigatório");

            const imageInput = document.getElementById("post-image");
            
            if (imageInput.files.length > 0) {
                const file = imageInput.files[0];
                const img = new Image();
                
                const reader = new FileReader();
                reader.onload = async function(e) {
                    img.src = e.target.result;
                    
                    img.onload = async function() {
                        // Check for NSFW
                        const isBad = await isNSFW(img);
                        
                        if (isBad) {
                            alert("Conteúdo impróprio detectado. Esta publicação foi bloqueada.");
                            return;
                        }
                        
                        // Save post with image
                        posts.unshift({
                            id: Date.now(),
                            title,
                            content,
                            author: currentUser.nickname,
                            avatar: currentUser.avatar,
                            image: e.target.result,
                            likes: 0
                        });
                        saveAll();
                        hideNewPostModal();
                        renderPosts();
                        imageInput.value = "";
                        document.getElementById("preview-img").classList.add("hidden");
                    };
                };
                reader.readAsDataURL(file);
            } else {
                // Post without image
                posts.unshift({
                    id: Date.now(),
                    title,
                    content,
                    author: currentUser.nickname,
                    avatar: currentUser.avatar,
                    likes: 0
                });
                saveAll();
                hideNewPostModal();
                renderPosts();
            }
        }

        function deletePost(id, e) {
            e.stopImmediatePropagation();
            if (!confirm("Apagar publicação?")) return;
            posts = posts.filter(p => p.id !== id);
            saveAll();
            renderPosts();
        }

        function likePost(id, e) {
            e.stopImmediatePropagation();
            const p = posts.find(x => x.id === id);
            if (p) {
                p.likes = (p.likes || 0) + 1;
                saveAll();
                renderPosts();
            }
        }

        function commentOnPost(id, e) {
            e.stopImmediatePropagation();
            if (!currentUser) return alert("Faça login para comentar");
            const t = prompt("Comentário:");
            if (!t) return;
            const p = posts.find(x => x.id === id);
            if (p) {
                p.comments = p.comments || [];
                p.comments.push({ author: currentUser.nickname, text: t });
                saveAll();
                renderPosts();
            }
        }

        function showNewPostModal() {
            if (!currentUser) return alert("Faça login primeiro");
            document.getElementById("new-post-modal").classList.remove("hidden");
            document.getElementById("new-post-modal").classList.add("flex");

            // Image preview
            const imageInput = document.getElementById("post-image");
            const preview = document.getElementById("preview-img");
            const previewContainer = document.getElementById("image-preview");

            imageInput.onchange = function() {
                if (imageInput.files.length > 0) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        preview.src = e.target.result;
                        previewContainer.classList.remove("hidden");
                    };
                    reader.readAsDataURL(imageInput.files[0]);
                }
            };
        }

        function hideNewPostModal() {
            document.getElementById("new-post-modal").classList.remove("flex");
            document.getElementById("new-post-modal").classList.add("hidden");
        }

        function initialize() {
            // Intro animation
            const txt = document.getElementById("animated-text");
            const word = "fórum";
            txt.innerHTML = "";
            word.split("").forEach((ch, i) => {
                const s = document.createElement("span");
                s.className = "inline-block opacity-0 translate-y-5";
                s.style.transition = `all .55s ease ${0.65 + i * 0.09}s`;
                s.textContent = ch;
                txt.appendChild(s);
                setTimeout(() => { s.style.opacity = "1"; s.style.transform = "translateY(0)"; }, 30);
            });

            setTimeout(() => {
                const intro = document.getElementById("intro-screen");
                intro.style.transition = "opacity .5s ease";
                intro.style.opacity = "0";
                setTimeout(() => {
                    intro.style.display = "none";
                    document.getElementById("main-app").classList.remove("hidden");
                }, 500);
            }, 3400);

            renderUserArea();
            renderPosts();

            // Preload NSFW model in background
            setTimeout(() => {
                loadNSFWModel().catch(() => {});
            }, 5000);
        }

        window.onload = initialize;
    </script>
</body>
</html>
