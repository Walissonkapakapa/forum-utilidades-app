<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sntx fórum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .post-card { transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-3px); }
        .modal { animation: modalPop 0.2s ease forwards; }
        @keyframes modalPop { from {opacity:0; transform:scale(0.95);} to {opacity:1; transform:scale(1);} }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 flex items-center justify-between h-16">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-white rounded-2xl flex items-center justify-center"><span class="font-bold text-black text-2xl">sntx</span></div>
                <span class="font-semibold text-2xl tracking-tight">sntx fórum</span>
            </div>
            <div class="flex items-center gap-x-4">
                <div id="user-area"></div>
                <button onclick="showNewPostModal()" class="bg-white text-black px-5 py-2 rounded-2xl font-semibold text-sm flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i> <span>Publicar</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 pt-8">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-5xl font-semibold tracking-tighter">sntx fórum</h1>
                <p class="text-zinc-400 mt-1">Compartilhe métodos que funcionam de verdade.</p>
            </div>
            <button onclick="toggleAdmin()" class="text-xs px-4 py-2 border border-zinc-700 rounded-2xl hover:bg-zinc-900">Modo Admin</button>
        </div>

        <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <!-- Intro Modal (tela de intro) -->
    <div id="intro-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[200]">
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 max-w-md text-center">
            <div class="w-16 h-16 bg-white rounded-2xl mx-auto flex items-center justify-center mb-6">
                <span class="text-black text-4xl font-black">sntx</span>
            </div>
            <h2 class="text-3xl font-semibold mb-2">Bem-vindo ao sntx fórum</h2>
            <p class="text-zinc-400 mb-6">Um espaço para compartilhar métodos úteis, scripts e técnicas que realmente funcionam.</p>
            <button onclick="closeIntro()" class="bg-white text-black w-full py-3 rounded-2xl font-semibold">Entrar no fórum</button>
        </div>
    </div>

    <!-- New Post Modal -->
    <div id="new-post-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 border border-zinc-700 w-full max-w-lg rounded-3xl p-7">
            <h3 class="text-2xl font-semibold mb-5">Nova publicação</h3>
            
            <input id="new-title" type="text" placeholder="Título" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 mb-4">
            <textarea id="new-content" placeholder="Descreva o método..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 h-32 mb-4"></textarea>
            
            <div class="flex justify-end gap-x-3">
                <button onclick="hideNewPostModal()" class="px-6 py-2 text-sm">Cancelar</button>
                <button onclick="createNewPost()" class="bg-white text-black px-8 py-2 rounded-2xl font-semibold">Publicar</button>
            </div>
        </div>
    </div>

    <script>
        let posts = JSON.parse(localStorage.getItem('sntxPosts') || '[]');
        let currentUser = JSON.parse(localStorage.getItem('sntxUser') || 'null');
        let isAdmin = false;
        let bannedUsers = JSON.parse(localStorage.getItem('sntxBanned') || '[]');

        function saveAll() {
            localStorage.setItem('sntxPosts', JSON.stringify(posts));
            if (currentUser) localStorage.setItem('sntxUser', JSON.stringify(currentUser));
            localStorage.setItem('sntxBanned', JSON.stringify(bannedUsers));
        }

        function renderUserArea() {
            const el = document.getElementById('user-area');
            if (!currentUser) {
                el.innerHTML = `<button onclick="login()" class="px-4 py-2 border border-zinc-700 rounded-2xl text-sm">Entrar / Criar Perfil</button>`;
            } else {
                el.innerHTML = `
                    <div class="flex items-center gap-x-3">
                        <div onclick="editProfile()" class="flex items-center gap-x-2 cursor-pointer">
                            <img src="${currentUser.avatar}" class="w-8 h-8 rounded-full object-cover border border-zinc-700">
                            <span>@${currentUser.nickname}</span>
                        </div>
                        <button onclick="logout()" class="text-xs text-zinc-500">sair</button>
                    </div>`;
            }
        }

        function login() {
            const nick = prompt('Escolha seu apelido:');
            if (!nick) return;
            currentUser = { nickname: nick, avatar: 'https://i.pravatar.cc/128?img=47' };
            saveAll();
            renderUserArea();
            renderPosts();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('sntxUser');
            renderUserArea();
            renderPosts();
        }

        function editProfile() {
            const newNick = prompt('Novo apelido:', currentUser.nickname);
            if (newNick) currentUser.nickname = newNick;

            // Upload de foto
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    currentUser.avatar = ev.target.result;
                    saveAll();
                    renderUserArea();
                    renderPosts();
                    alert('Foto de perfil atualizada!');
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function toggleAdmin() {
            if (isAdmin) {
                isAdmin = false;
                alert('Modo Admin desativado');
            } else {
                const pass = prompt('Senha de admin:');
                if (pass === 'sntxadmin') {  // Senha simples
                    isAdmin = true;
                    alert('Modo Admin ativado! Você pode banir e apagar posts.');
                } else {
                    alert('Senha incorreta');
                }
            }
            renderPosts();
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = '';

            posts.forEach(post => {
                if (bannedUsers.includes(post.author)) return; // Esconde posts de banidos

                const canDelete = currentUser && (post.author === currentUser.nickname || isAdmin);

                const div = document.createElement('div');
                div.className = 'post-card bg-zinc-900 border border-zinc-800 rounded-3xl p-5';
                div.innerHTML = `
                    <div class="flex justify-between">
                        <span class="text-xs px-3 py-1 bg-zinc-800 rounded-full">${post.category || 'Geral'}</span>
                        ${canDelete ? `<button onclick="deletePost(${post.id}); event.stopImmediatePropagation();" class="text-red-400 text-xs">Apagar</button>` : ''}
                    </div>
                    <h3 class="font-semibold text-xl mt-3 mb-2">${post.title}</h3>
                    <p class="text-sm text-zinc-400 line-clamp-3">${post.content}</p>
                    
                    <div class="flex items-center justify-between mt-5 text-sm">
                        <div class="flex items-center gap-x-2">
                            <img src="${post.avatar}" class="w-6 h-6 rounded-full">
                            <span class="text-zinc-400">@${post.author}</span>
                        </div>
                        <div class="flex gap-x-4">
                            <button onclick="likePost(${post.id}); event.stopImmediatePropagation();" class="flex items-center gap-x-1">
                                <i class="fa-solid fa-heart text-red-400"></i> <span>${post.likes || 0}</span>
                            </button>
                            <button onclick="commentOnPost(${post.id}); event.stopImmediatePropagation();" class="flex items-center gap-x-1">
                                <i class="fa-regular fa-comment"></i> <span>${(post.comments || []).length}</span>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function createNewPost() {
            if (!currentUser) { alert('Faça login primeiro'); return; }
            if (bannedUsers.includes(currentUser.nickname)) { alert('Você está banido.'); return; }

            const title = document.getElementById('new-title').value.trim();
            const content = document.getElementById('new-content').value.trim();
            if (!title) return alert('Título obrigatório');

            posts.unshift({
                id: Date.now(),
                title,
                content,
                author: currentUser.nickname,
                avatar: currentUser.avatar,
                category: 'Geral',
                likes: 0,
                comments: [],
                date: new Date().toISOString()
            });

            saveAll();
            hideNewPostModal();
            renderPosts();
        }

        function deletePost(id) {
            if (!confirm('Tem certeza que quer apagar este post?')) return;
            posts = posts.filter(p => p.id !== id);
            saveAll();
            renderPosts();
        }

        function likePost(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                post.likes = (post.likes || 0) + 1;
                saveAll();
                renderPosts();
            }
        }

        function commentOnPost(id) {
            if (!currentUser) { alert('Faça login para comentar'); return; }
            const text = prompt('Seu comentário:');
            if (!text) return;

            const post = posts.find(p => p.id === id);
            if (post) {
                post.comments = post.comments || [];
                post.comments.push({ author: currentUser.nickname, text });
                saveAll();
                renderPosts();
            }
        }

        function showNewPostModal() {
            if (!currentUser) return alert('Faça login primeiro');
            document.getElementById('new-post-modal').classList.remove('hidden');
            document.getElementById('new-post-modal').classList.add('flex');
        }

        function hideNewPostModal() {
            document.getElementById('new-post-modal').classList.remove('flex');
            document.getElementById('new-post-modal').classList.add('hidden');
        }

        function closeIntro() {
            document.getElementById('intro-modal').classList.add('hidden');
            localStorage.setItem('sntxIntroSeen', 'true');
        }

        function checkIntro() {
            if (!localStorage.getItem('sntxIntroSeen')) {
                document.getElementById('intro-modal').classList.remove('hidden');
            }
        }

        function initialize() {
            loadData = () => {}; // already loaded above
            renderUserArea();
            renderPosts();
            checkIntro();

            // Demo post if empty
            if (posts.length === 0) {
                posts.push({
                    id: 1, title: "Bem-vindo ao sntx fórum", content: "Aqui você pode compartilhar métodos úteis. Teste o modo admin com a senha 'sntxadmin'.",
                    author: "sntx", avatar: "https://i.pravatar.cc/128?img=47", likes: 12, comments: []
                });
                saveAll();
                renderPosts();
            }
        }

        window.onload = initialize;
    </script>
</body>
</html>
