<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sntx fórum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .post-card { transition: all 0.2s ease; }
        .post-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <!-- Intro -->
    <div id="intro-screen" class="fixed inset-0 bg-[#0a0a0a] flex items-center justify-center z-[300]">
        <div class="text-center">
            <div class="mb-3"><span class="font-display text-[5.5rem] font-bold tracking-[-4px] text-white">sntx</span></div>
            <div id="animated-text" class="font-display text-4xl font-semibold tracking-[-2px] text-zinc-400"></div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
            <div class="max-w-screen-2xl mx-auto px-6 flex items-center justify-between h-16">
                <div class="flex items-center gap-x-3">
                    <div class="w-8 h-8 bg-white rounded-xl flex items-center justify-center"><span class="font-bold text-black">s</span></div>
                    <span class="font-semibold text-xl tracking-tight">sntx fórum</span>
                </div>
                <div class="flex items-center gap-x-3">
                    <div id="user-area"></div>
                    <button onclick="showNewPostModal()" class="bg-white text-black px-5 h-10 rounded-2xl text-sm font-semibold flex items-center gap-x-2">
                        <i class="fa-solid fa-plus"></i> <span>Publicar</span>
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-screen-2xl mx-auto px-6 pt-10">
            <div class="max-w-2xl mb-8">
                <h1 class="text-5xl font-semibold tracking-tighter">sntx fórum</h1>
                <p class="text-zinc-400 mt-2">Um espaço limpo para compartilhar métodos que funcionam.</p>
            </div>

            <div class="flex justify-end mb-4">
                <button onclick="toggleAdmin()" class="text-xs px-4 py-1.5 border border-zinc-700 rounded-2xl hover:bg-zinc-900">Modo Admin</button>
            </div>

            <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <div id="new-post-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
        <div class="bg-zinc-900 border border-zinc-700 w-full max-w-md rounded-3xl p-7">
            <h3 class="text-2xl font-semibold mb-6">Nova publicação</h3>
            <input id="new-title" type="text" placeholder="Título" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 mb-4">
            <textarea id="new-content" placeholder="Descreva o método..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 h-28 mb-5"></textarea>
            <div class="flex justify-end gap-x-3">
                <button onclick="hideNewPostModal()" class="px-6 py-2 text-sm">Cancelar</button>
                <button onclick="createNewPost()" class="bg-white text-black px-7 py-2 rounded-2xl font-semibold">Publicar</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== HASHED PASSWORD (746507) ====================
        const ADMIN_PASSWORD_HASH = "a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3"; // SHA-256 of "746507"

        async function hashString(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function toggleAdmin() {
            if (isAdmin) {
                isAdmin = false;
                alert('Modo Admin desativado');
                renderPosts();
                return;
            }

            const pass = prompt('Digite a senha de admin:');
            if (!pass) return;

            const hashedInput = await hashString(pass);
            if (hashedInput === ADMIN_PASSWORD_HASH) {
                isAdmin = true;
                alert('Modo Admin ativado');
                renderPosts();
            } else {
                alert('Senha incorreta');
            }
        }

        // ==================== RESTO DO CÓDIGO ====================
        let posts = JSON.parse(localStorage.getItem('sntxPosts') || '[]');
        let currentUser = JSON.parse(localStorage.getItem('sntxUser') || 'null');
        let isAdmin = false;
        let bannedUsers = JSON.parse(localStorage.getItem('sntxBanned') || '[]');

        function saveAll() {
            localStorage.setItem('sntxPosts', JSON.stringify(posts));
            if (currentUser) localStorage.setItem('sntxUser', JSON.stringify(currentUser));
            localStorage.setItem('sntxBanned', JSON.stringify(bannedUsers));
        }

        function renderUserArea() {
            const el = document.getElementById('user-area');
            if (!currentUser) {
                el.innerHTML = `<button onclick="login()" class="px-5 py-2 border border-zinc-700 rounded-2xl text-sm">Entrar</button>`;
            } else {
                el.innerHTML = `<div class="flex items-center gap-x-3"><div onclick="editProfile()" class="flex items-center gap-x-2 cursor-pointer"><img src="${currentUser.avatar}" class="w-8 h-8 rounded-full object-cover border border-zinc-700"><span>@${currentUser.nickname}</span></div><button onclick="logout()" class="text-xs text-zinc-500">sair</button></div>`;
            }
        }

        function login() {
            const nick = prompt('Seu apelido:');
            if (!nick) return;
            currentUser = { nickname: nick, avatar: 'https://i.pravatar.cc/128?img=47' };
            saveAll();
            renderUserArea();
            renderPosts();
        }

        function logout() {
            currentUser = null; localStorage.removeItem('sntxUser'); renderUserArea(); renderPosts();
        }

        function editProfile() {
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = ev => { currentUser.avatar = ev.target.result; saveAll(); renderUserArea(); renderPosts(); };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = '';
            posts.forEach(post => {
                if (bannedUsers.includes(post.author)) return;
                const canDelete = currentUser && (post.author === currentUser.nickname || isAdmin);
                const card = document.createElement('div');
                card.className = 'post-card bg-zinc-900 border border-zinc-800 rounded-3xl p-6 cursor-pointer';
                card.innerHTML = `
                    <div class="flex justify-between mb-4">
                        <span class="text-xs px-3 py-1 bg-zinc-800 rounded-full">${post.category || 'Geral'}</span>
                        ${canDelete ? `<button onclick="deletePost(${post.id}, event)" class="text-red-400 text-xs">Apagar</button>` : ''}
                    </div>
                    <h3 class="font-semibold text-xl mb-2">${post.title}</h3>
                    <p class="text-sm text-zinc-400 line-clamp-3">${post.content}</p>
                    <div class="flex justify-between mt-5 text-sm">
                        <div class="flex items-center gap-x-2"><img src="${post.avatar}" class="w-6 h-6 rounded-full"><span class="text-zinc-400">@${post.author}</span></div>
                        <div class="flex gap-x-4 text-zinc-400">
                            <button onclick="likePost(${post.id}, event)"><i class="fa-solid fa-heart"></i> ${post.likes || 0}</button>
                            <button onclick="commentOnPost(${post.id}, event)"><i class="fa-regular fa-comment"></i></button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function createNewPost() {
            if (!currentUser) return alert('Faça login primeiro');
            const title = document.getElementById('new-title').value.trim();
            const content = document.getElementById('new-content').value.trim();
            if (!title) return;
            posts.unshift({ id: Date.now(), title, content, author: currentUser.nickname, avatar: currentUser.avatar, likes: 0, comments: [] });
            saveAll(); hideNewPostModal(); renderPosts();
        }

        function deletePost(id, e) { e.stopImmediatePropagation(); if (!confirm('Apagar post?')) return; posts = posts.filter(p => p.id !== id); saveAll(); renderPosts(); }
        function likePost(id, e) { e.stopImmediatePropagation(); const p = posts.find(x => x.id === id); if (p) { p.likes = (p.likes||0)+1; saveAll(); renderPosts(); } }
        function commentOnPost(id, e) { e.stopImmediatePropagation(); if (!currentUser) return alert('Login necessário'); const t = prompt('Comentário:'); if (!t) return; const p = posts.find(x => x.id === id); if (p) { p.comments = p.comments || []; p.comments.push({author: currentUser.nickname, text: t}); saveAll(); renderPosts(); } }

        function showNewPostModal() { if (!currentUser) return alert('Faça login'); document.getElementById('new-post-modal').classList.remove('hidden'); document.getElementById('new-post-modal').classList.add('flex'); }
        function hideNewPostModal() { document.getElementById('new-post-modal').classList.remove('flex'); document.getElementById('new-post-modal').classList.add('hidden'); }

        function initialize() {
            // Inicia animação da intro
            const container = document.getElementById('animated-text');
            const text = "fórum";
            container.innerHTML = '';
            text.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.className = 'inline-block opacity-0 translate-y-5';
                span.style.transition = `all 0.5s ease ${0.7 + i * 0.1}s`;
                span.textContent = char;
                container.appendChild(span);
                setTimeout(() => { span.style.opacity = '1'; span.style.transform = 'translateY(0)'; }, 50);
            });

            setTimeout(() => {
                document.getElementById('intro-screen').style.transition = 'opacity 0.5s ease';
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                    document.getElementById('main-app').classList.remove('hidden');
                }, 500);
            }, 3200);

            renderUserArea();
            renderPosts();

            // Sem post de "Bem-vindo" com senha
        }

        window.onload = initialize;
    </script>
</body>
</html>
