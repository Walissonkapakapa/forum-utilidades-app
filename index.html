<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$mctx | sntx fórum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nsfwjs@2.4.2/dist/nsfwjs.min.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .post-card { transition: all 0.3s ease; }
        .post-card:hover { transform: translateY(-3px); }
        .profile-page { animation: slideIn 0.3s ease forwards; }
        .logo-glow { filter: drop-shadow(0 0 8px rgba(234, 179, 8, 0.5)); }
    </style>
</head>
<body>
    <!-- Intro -->
    <div id="intro-screen" class="fixed inset-0 bg-[#0a0a0a] flex items-center justify-center z-[300]">
        <div class="text-center">
            <div class="mb-4">
                <img src="logo.png" alt="$mctx Logo" class="h-20 w-auto mx-auto logo-glow" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span class="font-display text-[5.5rem] font-bold tracking-[-5px] text-white" style="display:none">$mctx</span>
            </div>
            <div id="animated-text" class="font-display text-4xl font-semibold tracking-[-2px] text-zinc-400"></div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
            <div class="max-w-screen-2xl mx-auto px-8 flex items-center justify-between h-20">
                <div class="flex items-center gap-x-3">
                    <img src="logo.png" alt="$mctx Logo" class="h-11 w-auto logo-glow" onerror="this.outerHTML='<div class=\"w-9 h-9 bg-white rounded-2xl flex items-center justify-center\"><span class=\"font-black text-black text-2xl\">$</span></div>'">
                    <span class="font-semibold text-2xl tracking-tight">sntx fórum</span>
                </div>
                <div class="flex items-center gap-x-3">
                    <div id="user-area"></div>
                    <button onclick="showNewPostModal()" class="bg-white text-black px-6 h-11 rounded-2xl font-semibold text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-plus"></i> <span>Publicar</span>
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-screen-2xl mx-auto px-8 pt-12">
            <div class="max-w-2xl mb-10">
                <div class="flex items-center gap-x-4 mb-3">
                    <img src="logo.png" alt="$mctx" class="h-12 w-auto logo-glow" onerror="this.style.display='none'">
                    <h1 class="text-6xl font-semibold tracking-tighter">sntx fórum</h1>
                </div>
                <p class="mt-3 text-xl text-zinc-400">Um espaço minimalista para compartilhar métodos que funcionam. <span class="text-amber-400">by $mctx</span></p>
            </div>

            <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- New Post Modal -->
    <div id="new-post-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4">
        <div class="bg-zinc-900 border border-zinc-700 w-full max-w-lg rounded-3xl p-8">
            <h3 class="text-2xl font-semibold mb-7">Nova publicação</h3>
            <input id="new-title" type="text" placeholder="Título" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 mb-4">
            <textarea id="new-content" placeholder="Descreva o método..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 h-28 mb-5"></textarea>

            <div class="mb-6">
                <label class="text-xs tracking-wider text-zinc-500 block mb-2">ADICIONAR FOTO (OPCIONAL)</label>
                <input type="file" id="post-image" accept="image/*" class="text-sm">
                <div id="image-preview" class="mt-3 hidden">
                    <img id="preview-img" class="max-h-48 rounded-2xl object-cover w-full">
                </div>
            </div>

            <div class="flex justify-end gap-x-3">
                <button onclick="hideNewPostModal()" class="px-6 py-2 text-sm text-zinc-400">Cancelar</button>
                <button onclick="createNewPost()" class="bg-white text-black px-8 py-2 rounded-2xl font-semibold">Publicar</button>
            </div>
        </div>
    </div>

    <!-- Comments Modal -->
    <div id="comments-modal" onclick="if (event.target.id === 'comments-modal') hideCommentsModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200] p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 border border-zinc-700 w-full max-w-lg rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold">Comentários</h3>
                <button onclick="hideCommentsModal()" class="text-zinc-400 hover:text-white"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            <div id="comments-list" class="space-y-4 max-h-80 overflow-auto mb-6"></div>
            <div class="flex gap-x-3">
                <input id="comment-input" type="text" placeholder="Escreva um comentário..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
                <button onclick="addCommentFromModal()" class="bg-white text-black px-6 rounded-2xl font-semibold">Enviar</button>
            </div>
        </div>
    </div>

    <!-- Profile (mais imersivo) -->
    <div id="profile-modal" onclick="if (event.target.id === 'profile-modal') hideProfileModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[200] p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 border border-zinc-700 w-full max-w-4xl rounded-3xl p-9 profile-page">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-x-6">
                    <img id="profile-avatar" class="w-24 h-24 rounded-2xl object-cover border border-zinc-700">
                    <div>
                        <div id="profile-nickname" class="text-4xl font-semibold"></div>
                        <div id="profile-count" class="text-zinc-400 mt-1 text-lg"></div>
                    </div>
                </div>
                <button onclick="hideProfileModal()" class="px-5 py-2 text-sm border border-zinc-700 rounded-2xl hover:bg-zinc-800">Voltar para o feed</button>
            </div>

            <h4 class="font-semibold mb-6 text-xl">Publicações</h4>
            <div id="profile-posts-list" class="space-y-4 max-h-[520px] overflow-auto"></div>
        </div>
    </div>

    <script>
        // NSFW + Admin
        let nsfwModel = null;
        const ADMIN_PASSWORD_HASH = "a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3";

        async function loadNSFWModel() {
            if (!nsfwModel) nsfwModel = await nsfwjs.load();
            return nsfwModel;
        }

        async function isNSFW(img) {
            try {
                const model = await loadNSFWModel();
                const preds = await model.classify(img);
                return preds.some(p => ['Porn','Hentai','Sexy'].includes(p.className) && p.probability > 0.65);
            } catch(e) { return false; }
        }

        async function hashString(str) {
            const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
        }

        async function toggleAdmin() {
            if (isAdmin) { isAdmin = false; alert("Modo Admin desativado"); renderPosts(); return; }
            const p = prompt("Senha de admin:");
            if (p && await hashString(p) === ADMIN_PASSWORD_HASH) { isAdmin = true; alert("Modo Admin ativado"); renderPosts(); }
            else alert("Senha incorreta");
        }

        let posts = JSON.parse(localStorage.getItem("sntxPosts") || "[]");
        let currentUser = JSON.parse(localStorage.getItem("sntxUser") || "null");
        let isAdmin = false;
        let currentPostForComment = null;

        function saveAll() {
            localStorage.setItem("sntxPosts", JSON.stringify(posts));
            if (currentUser) localStorage.setItem("sntxUser", JSON.stringify(currentUser));
        }

        function renderUserArea() {
            const el = document.getElementById("user-area");
            if (!currentUser) {
                el.innerHTML = `<button onclick="login()" class="px-5 py-2 border border-zinc-700 rounded-2xl text-sm">Entrar</button>`;
            } else {
                el.innerHTML = `<div class="flex items-center gap-x-3"><div onclick="editProfile()" class="flex items-center gap-x-2 cursor-pointer"><img src="${currentUser.avatar}" class="w-8 h-8 rounded-2xl object-cover border border-zinc-700"><span>@${currentUser.nickname}</span></div><button onclick="logout()" class="text-xs text-zinc-500">sair</button></div>`;
            }
        }

        function login() {
            const nick = prompt("Seu apelido:");
            if (!nick) return;
            currentUser = { nickname: nick, avatar: "https://i.pravatar.cc/128?img=47" };
            saveAll(); renderUserArea(); renderPosts();
        }

        function logout() { currentUser = null; localStorage.removeItem("sntxUser"); renderUserArea(); renderPosts(); }

        function editProfile() {
            const inp = document.createElement("input");
            inp.type = "file"; inp.accept = "image/*";
            inp.onchange = e => {
                const r = new FileReader();
                r.onload = ev => { currentUser.avatar = ev.target.result; saveAll(); renderUserArea(); renderPosts(); };
                r.readAsDataURL(e.target.files[0]);
            };
            inp.click();
        }

        function renderPosts() {
            const container = document.getElementById("posts-container");
            container.innerHTML = "";

            posts.forEach(post => {
                const canDelete = currentUser && (post.author === currentUser.nickname || isAdmin);
                const card = document.createElement("div");
                card.className = "post-card bg-zinc-900 border border-zinc-800 rounded-3xl p-7 cursor-pointer";
                
                let imageHTML = post.image ? `<img src="${post.image}" class="w-full rounded-2xl mb-5 max-h-80 object-cover">` : "";

                card.innerHTML = `
                    <div class="flex justify-between mb-5">
                        <span class="text-xs px-3 py-1 bg-zinc-800 rounded-full">${post.category || "Geral"}</span>
                        ${canDelete ? `<button onclick="deletePost(${post.id}, event)" class="text-red-400 text-xs">Apagar</button>` : ""}
                    </div>
                    ${imageHTML}
                    <h3 class="font-semibold text-2xl mb-3">${post.title}</h3>
                    <p class="text-[15px] text-zinc-400">${post.content}</p>

                    <div class="mt-7 pt-6 border-t border-zinc-800 flex justify-between items-center">
                        <div onclick="showUserProfile('${post.author}', event)" class="flex items-center gap-x-3 cursor-pointer">
                            <img src="${post.avatar}" class="w-8 h-8 rounded-2xl">
                            <span class="text-sm">@${post.author}</span>
                        </div>
                        <div class="flex gap-x-5 text-sm text-zinc-400">
                            <button onclick="likePost(${post.id}, event)"><i class="fa-solid fa-heart"></i> ${post.likes || 0}</button>
                            <button onclick="showComments(${post.id}, event)"><i class="fa-regular fa-comment"></i> ${(post.comments || []).length}</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Comments
        function showComments(postId, e) {
            if (e) e.stopImmediatePropagation();
            currentPostForComment = postId;
            const post = posts.find(p => p.id === postId);
            if (!post) return;

            const list = document.getElementById("comments-list");
            list.innerHTML = "";

            if (!post.comments || post.comments.length === 0) {
                list.innerHTML = `<p class="text-zinc-400 text-sm">Nenhum comentário ainda.</p>`;
            } else {
                post.comments.forEach(c => {
                    const d = document.createElement("div");
                    d.className = "bg-zinc-800 p-4 rounded-2xl";
                    d.innerHTML = `<span class="font-medium">@${c.author}</span><p class="text-sm mt-1">${c.text}</p>`;
                    list.appendChild(d);
                });
            }

            document.getElementById("comments-modal").classList.remove("hidden");
            document.getElementById("comments-modal").classList.add("flex");
        }

        function hideCommentsModal() {
            document.getElementById("comments-modal").classList.remove("flex");
            document.getElementById("comments-modal").classList.add("hidden");
        }

        function addCommentFromModal() {
            if (!currentUser || !currentPostForComment) return;
            const input = document.getElementById("comment-input");
            const text = input.value.trim();
            if (!text) return;

            const post = posts.find(p => p.id === currentPostForComment);
            if (post) {
                post.comments = post.comments || [];
                post.comments.push({ author: currentUser.nickname, text });
                saveAll();
                hideCommentsModal();
                renderPosts();
            }
        }

        // Profile (mais imersivo)
        function showUserProfile(username, e) {
            if (e) e.stopImmediatePropagation();
            const userPosts = posts.filter(p => p.author === username);
            if (!userPosts.length) return;

            document.getElementById("profile-avatar").src = userPosts[0].avatar;
            document.getElementById("profile-nickname").innerText = `@${username}`;
            document.getElementById("profile-count").innerText = `${userPosts.length} publicações`;

            const list = document.getElementById("profile-posts-list");
            list.innerHTML = "";

            userPosts.forEach(post => {
                let img = post.image ? `<img src="${post.image}" class="w-full rounded-2xl mb-4 max-h-64 object-cover">` : "";
                const d = document.createElement("div");
                d.className = "bg-zinc-800 border border-zinc-700 p-6 rounded-2xl";
                d.innerHTML = `${img}<h4 class="font-semibold text-xl mb-2">${post.title}</h4><p class="text-sm text-zinc-400">${post.content}</p>`;
                list.appendChild(d);
            });

            document.getElementById("profile-modal").classList.remove("hidden");
            document.getElementById("profile-modal").classList.add("flex");
        }

        function hideProfileModal() {
            document.getElementById("profile-modal").classList.remove("flex");
            document.getElementById("profile-modal").classList.add("hidden");
        }

        async function createNewPost() {
            if (!currentUser) return alert("Faça login primeiro");
            const title = document.getElementById("new-title").value.trim();
            const content = document.getElementById("new-content").value.trim();
            if (!title) return;

            const imageInput = document.getElementById("post-image");

            if (imageInput.files.length > 0) {
                const file = imageInput.files[0];
                const img = new Image();
                const reader = new FileReader();

                reader.onload = async function(e) {
                    img.src = e.target.result;
                    img.onload = async function() {
                        const isBad = await isNSFW(img);
                        if (isBad) {
                            alert("Conteúdo impróprio detectado. Publicação bloqueada.");
                            return;
                        }
                        posts.unshift({ id: Date.now(), title, content, author: currentUser.nickname, avatar: currentUser.avatar, image: e.target.result, likes: 0, comments: [] });
                        saveAll(); hideNewPostModal(); renderPosts();
                        imageInput.value = "";
                        document.getElementById("preview-img").classList.add("hidden");
                    };
                };
                reader.readAsDataURL(file);
            } else {
                posts.unshift({ id: Date.now(), title, content, author: currentUser.nickname, avatar: currentUser.avatar, likes: 0, comments: [] });
                saveAll(); hideNewPostModal(); renderPosts();
            }
        }

        function deletePost(id, e) { e.stopImmediatePropagation(); if (!confirm("Apagar?")) return; posts = posts.filter(p => p.id !== id); saveAll(); renderPosts(); }

        function likePost(id, e) { e.stopImmediatePropagation(); const p = posts.find(x => x.id === id); if (p) { p.likes = (p.likes||0)+1; saveAll(); renderPosts(); } }

        function showNewPostModal() {
            if (!currentUser) return alert("Faça login primeiro");
            document.getElementById("new-post-modal").classList.remove("hidden");
            document.getElementById("new-post-modal").classList.add("flex");

            const imageInput = document.getElementById("post-image");
            const preview = document.getElementById("preview-img");
            const previewContainer = document.getElementById("image-preview");

            imageInput.onchange = () => {
                if (imageInput.files.length > 0) {
                    const r = new FileReader();
                    r.onload = e => { preview.src = e.target.result; previewContainer.classList.remove("hidden"); };
                    r.readAsDataURL(imageInput.files[0]);
                }
            };
        }

        function hideNewPostModal() {
            document.getElementById("new-post-modal").classList.remove("flex");
            document.getElementById("new-post-modal").classList.add("hidden");
        }

        function initialize() {
            const txt = document.getElementById("animated-text");
            const word = "fórum";
            txt.innerHTML = "";
            word.split("").forEach((ch, i) => {
                const s = document.createElement("span");
                s.className = "inline-block opacity-0 translate-y-5";
                s.style.transition = `all .55s ease ${0.65 + i*0.09}s`;
                s.textContent = ch;
                txt.appendChild(s);
                setTimeout(() => { s.style.opacity="1"; s.style.transform="translateY(0)"; },30);
            });

            setTimeout(() => {
                const intro = document.getElementById("intro-screen");
                intro.style.transition = "opacity .5s ease";
                intro.style.opacity = "0";
                setTimeout(() => { intro.style.display="none"; document.getElementById("main-app").classList.remove("hidden"); },500);
            }, 3400);

            renderUserArea();
            renderPosts();

            setTimeout(() => { loadNSFWModel().catch(()=>{}); }, 5000);
        }

        window.onload = initialize;
    </script>
</body>
</html>
